<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trade Calendar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap');
:root{
  --bg:#06080e;--surface:#0b1219;--card:#0f1a26;--border:#1a2e42;
  --accent:#38bdf8;--green:#22d3a0;--red:#f87171;--gold:#fbbf24;--orange:#fb923c;
  --purple:#a78bfa;--text:#dde8f5;--sub:#6b8fad;--muted:#2a4158;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Layout ── */
.app{display:grid;grid-template-columns:320px 1fr;min-height:100vh;}

/* ── Sidebar ── */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:24px;overflow-y:auto;max-height:100vh;position:sticky;top:0;}
.logo{font-size:20px;font-weight:800;margin-bottom:4px;}
.logo span{color:var(--accent);}
.logo-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:24px;}

/* Add form */
.form-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
.form-title{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:9px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:4px;}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-size:12px;font-family:'DM Mono',monospace;outline:none;transition:border .15s;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field input[type="date"]{color-scheme:dark;}

.btn{width:100%;border:none;border-radius:7px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:opacity .15s;margin-top:4px;}
.btn:hover{opacity:.85;}
.btn-add{background:var(--accent);color:#06080e;}
.btn-clear{background:var(--card);color:var(--muted);border:1px solid var(--border);margin-top:8px;}

/* Stock list */
.stock-list{margin-top:8px;}
.stock-chip{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 12px;margin-bottom:6px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .15s;}
.stock-chip:hover{border-color:var(--accent);color:var(--accent);}
.stock-chip .sym{font-weight:600;}
.stock-chip .chip-verdict{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;}
.chip-buy{background:var(--green)15;color:var(--green);}
.chip-wait{background:var(--gold)15;color:var(--gold);}
.chip-avoid{background:var(--red)15;color:var(--red);}
.chip-del{color:var(--muted);cursor:pointer;padding:0 4px;font-size:14px;line-height:1;}
.chip-del:hover{color:var(--red);}

/* ── Main ── */
.main{padding:28px;overflow-y:auto;}

/* Month nav */
.month-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.month-label{font-size:26px;font-weight:800;}
.month-label span{color:var(--accent);}
.nav-btns{display:flex;gap:8px;}
.nav-btn{background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--sub);padding:7px 14px;font-size:13px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;transition:all .15s;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Calendar grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:28px;}
.day-header{background:var(--surface);text-align:center;padding:8px 4px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.day-cell{background:var(--card);min-height:90px;padding:8px;position:relative;cursor:default;transition:background .1s;}
.day-cell.other-month{background:var(--bg);}
.day-cell.today{background:#0f1e30;}
.day-cell.today .day-num{color:var(--accent);font-weight:700;}
.day-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--sub);margin-bottom:4px;}
.day-cell.other-month .day-num{color:var(--muted);}

/* Events */
.event{border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700;margin-bottom:2px;font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.event:hover{opacity:.85;}
.ev-earnings{background:var(--red)20;color:var(--red);border-left:2px solid var(--red);}
.ev-exit{background:var(--orange)20;color:var(--orange);border-left:2px solid var(--orange);}
.ev-buy{background:var(--green)20;color:var(--green);border-left:2px solid var(--green);}
.ev-review{background:var(--purple)20;color:var(--purple);border-left:2px solid var(--purple);}
.ev-entry{background:var(--accent)20;color:var(--accent);border-left:2px solid var(--accent);}

/* Legend */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);}
.leg-dot{width:10px;height:10px;border-radius:2px;}

/* Upcoming panel */
.upcoming{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;}
.upcoming-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text);}
.upcoming-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);animation:fadeUp .2s ease;}
.upcoming-item:last-child{border-bottom:none;}
.up-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);min-width:72px;}
.up-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.up-content{flex:1;}
.up-sym{font-weight:700;font-size:13px;font-family:'DM Mono',monospace;}
.up-label{font-size:11px;color:var(--sub);margin-top:1px;}
.up-days{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;}
.days-soon{background:var(--red)15;color:var(--red);}
.days-near{background:var(--gold)15;color:var(--gold);}
.days-ok{background:var(--green)15;color:var(--green);}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#06080e;font-family:'DM Mono',monospace;font-size:12px;padding:8px 16px;border-radius:7px;display:none;font-weight:600;z-index:999;}

@media(max-width:768px){
  .app{grid-template-columns:1fr;}
  .sidebar{position:static;max-height:none;}
}
</style>
</head>
<body>
<div class="app">

<!-- ── SIDEBAR ── -->
<div class="sidebar">
  <div class="logo">Trade <span>Calendar</span></div>
  <div class="logo-sub">// earnings · exits · reviews</div>

  <div class="form-section">
    <div class="form-title">Add Stock</div>

    <div class="field">
      <label>Symbol</label>
      <input id="f-sym" type="text" placeholder="ETR" maxlength="8" style="text-transform:uppercase"/>
    </div>
    <div class="field">
      <label>Verdict</label>
      <select id="f-verdict">
        <option value="buy">BUY</option>
        <option value="wait">WAIT</option>
        <option value="avoid">AVOID</option>
      </select>
    </div>
    <div class="field">
      <label>Earnings Date</label>
      <input id="f-earnings" type="date"/>
    </div>
    <div class="field">
      <label>Exit Deadline (before earnings)</label>
      <input id="f-exit" type="date"/>
    </div>
    <div class="field">
      <label>Ideal Entry Window Start</label>
      <input id="f-entry-start" type="date"/>
    </div>
    <div class="field">
      <label>Ideal Entry Window End</label>
      <input id="f-entry-end" type="date"/>
    </div>
    <div class="field">
      <label>Weekly Review Date</label>
      <input id="f-review" type="date"/>
    </div>

    <button class="btn btn-add" onclick="addStock()">Add to Calendar →</button>
    <button class="btn btn-clear" onclick="clearAll()">Clear All</button>
  </div>

  <div class="stock-list" id="stock-list"></div>
</div>

<!-- ── MAIN ── -->
<div class="main">
  <div class="month-nav">
    <div class="month-label" id="month-label">April <span>2026</span></div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="prevMonth()">← Prev</button>
      <button class="nav-btn" onclick="goToday()">Today</button>
      <button class="nav-btn" onclick="nextMonth()">Next →</button>
    </div>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Entry window</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Earnings date</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--orange)"></div>Exit deadline</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--purple)"></div>Weekly review</div>
  </div>

  <div class="cal-grid" id="cal-grid"></div>

  <div class="upcoming">
    <div class="upcoming-title">📅 Upcoming Events</div>
    <div id="upcoming-list"></div>
  </div>
</div>

</div>
<div id="toast">✓ Added!</div>

<script>
// ── State ──
let stocks = JSON.parse(localStorage.getItem('tradeCalStocks') || '[]');
let viewYear = 2026, viewMonth = 3; // April 2026 (0-indexed)

const TODAY = new Date();
TODAY.setHours(0,0,0,0);

// Pre-load known stocks from our analysis
function preload(){
  if(stocks.length > 0) return;
  const defaults = [
    {id:'1',sym:'CVS',  verdict:'buy',  earnings:'2026-05-01',exit:'2026-04-27',entryStart:'2026-04-07',entryEnd:'2026-04-10',review:'2026-04-09'},
    {id:'2',sym:'ETR',  verdict:'buy',  earnings:'2026-04-29',exit:'2026-04-25',entryStart:'2026-04-07',entryEnd:'2026-04-10',review:'2026-04-09'},
    {id:'3',sym:'CNC',  verdict:'buy',  earnings:'2026-04-28',exit:'2026-04-24',entryStart:'2026-04-07',entryEnd:'2026-04-09',review:'2026-04-09'},
    {id:'4',sym:'BAH',  verdict:'wait', earnings:'2026-05-22',exit:'2026-05-18',entryStart:'2026-04-07',entryEnd:'2026-04-14',review:'2026-04-14'},
    {id:'5',sym:'SAIC', verdict:'wait', earnings:'2026-06-08',exit:'2026-06-04',entryStart:'2026-04-10',entryEnd:'2026-04-14',review:'2026-04-14'},
    {id:'6',sym:'NOV',  verdict:'wait', earnings:'2026-04-27',exit:'2026-04-23',entryStart:'',entryEnd:'',review:'2026-04-28'},
  ];
  stocks = defaults;
  save();
}

// ── Storage ──
function save(){ localStorage.setItem('tradeCalStocks', JSON.stringify(stocks)); }

// ── Add stock ──
function addStock(){
  const sym = document.getElementById('f-sym').value.trim().toUpperCase();
  if(!sym){ alert('Enter a symbol.'); return; }
  const s = {
    id: Date.now().toString(),
    sym,
    verdict:    document.getElementById('f-verdict').value,
    earnings:   document.getElementById('f-earnings').value,
    exit:       document.getElementById('f-exit').value,
    entryStart: document.getElementById('f-entry-start').value,
    entryEnd:   document.getElementById('f-entry-end').value,
    review:     document.getElementById('f-review').value,
  };
  stocks.push(s);
  save(); render();
  ['f-sym','f-earnings','f-exit','f-entry-start','f-entry-end','f-review'].forEach(id=>{
    document.getElementById(id).value='';
  });
  showToast();
}

function deleteStock(id){
  stocks = stocks.filter(s=>s.id!==id);
  save(); render();
}

function clearAll(){
  if(!confirm('Clear all stocks from calendar?')) return;
  stocks=[]; save(); render();
}

// ── Build events map ──
function buildEvents(){
  const map = {}; // date string -> [{type, sym, verdict}]
  const add = (date, ev) => {
    if(!date) return;
    if(!map[date]) map[date]=[];
    map[date].push(ev);
  };
  stocks.forEach(s=>{
    if(s.earnings)   add(s.earnings,   {type:'earnings', sym:s.sym, verdict:s.verdict, label:'Earnings: '+s.sym});
    if(s.exit)       add(s.exit,       {type:'exit',     sym:s.sym, verdict:s.verdict, label:'Exit by: '+s.sym});
    if(s.review)     add(s.review,     {type:'review',   sym:s.sym, verdict:s.verdict, label:'Review: '+s.sym});
    // Entry window — mark each day in range
    if(s.entryStart && s.entryEnd){
      let d = new Date(s.entryStart+'T12:00:00');
      const end = new Date(s.entryEnd+'T12:00:00');
      while(d <= end){
        const ds = d.toISOString().split('T')[0];
        add(ds, {type:'entry', sym:s.sym, verdict:s.verdict, label:'Enter: '+s.sym});
        d.setDate(d.getDate()+1);
      }
    }
  });
  return map;
}

// ── Render calendar ──
function renderCalendar(){
  const label = document.getElementById('month-label');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  label.innerHTML = months[viewMonth]+' <span>'+viewYear+'</span>';

  const events = buildEvents();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Headers
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{
    const h = document.createElement('div');
    h.className='day-header'; h.textContent=d;
    grid.appendChild(h);
  });

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();

  let cells = [];
  // Prev month padding
  for(let i=firstDay-1;i>=0;i--) cells.push({day:daysInPrev-i, month:'prev'});
  // Current month
  for(let i=1;i<=daysInMonth;i++) cells.push({day:i, month:'cur'});
  // Next month padding
  let next=1;
  while(cells.length%7!==0) cells.push({day:next++, month:'next'});

  cells.forEach(({day,month})=>{
    const cell = document.createElement('div');
    cell.className = 'day-cell'+(month!=='cur'?' other-month':'');

    let dateStr = '';
    if(month==='cur'){
      const d = new Date(viewYear, viewMonth, day);
      d.setHours(0,0,0,0);
      if(d.getTime()===TODAY.getTime()) cell.classList.add('today');
      dateStr = viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    }

    const num = document.createElement('div');
    num.className='day-num'; num.textContent=day;
    cell.appendChild(num);

    if(dateStr && events[dateStr]){
      const evs = events[dateStr];
      // Deduplicate same sym+type
      const seen = new Set();
      evs.forEach(ev=>{
        const key = ev.sym+ev.type;
        if(seen.has(key)) return;
        seen.add(key);
        const e = document.createElement('div');
        e.className = `event ev-${ev.type}`;
        e.textContent = ev.label;
        e.title = ev.label;
        cell.appendChild(e);
      });
    }

    grid.appendChild(cell);
  });
}

// ── Render sidebar stock list ──
function renderStockList(){
  const list = document.getElementById('stock-list');
  list.innerHTML = '';
  if(stocks.length===0){
    list.innerHTML='<div style="font-size:11px;color:var(--muted);text-align:center;padding:12px">No stocks added yet.</div>';
    return;
  }
  stocks.forEach(s=>{
    const chip = document.createElement('div');
    chip.className='stock-chip';
    chip.innerHTML=`
      <span class="sym">${s.sym}</span>
      <span class="chip-verdict chip-${s.verdict}">${s.verdict.toUpperCase()}</span>
      <span class="chip-del" onclick="deleteStock('${s.id}')">×</span>`;
    list.appendChild(chip);
  });
}

// ── Render upcoming events ──
function renderUpcoming(){
  const list = document.getElementById('upcoming-list');
  const events = buildEvents();

  // Collect all future events
  let upcoming = [];
  Object.entries(events).forEach(([date, evs])=>{
    const d = new Date(date+'T12:00:00');
    if(d < TODAY) return;
    const seen = new Set();
    evs.forEach(ev=>{
      const key = ev.sym+ev.type;
      if(seen.has(key)) return;
      seen.add(key);
      upcoming.push({date, d, ...ev});
    });
  });

  upcoming.sort((a,b)=>a.d-b.d);
  upcoming = upcoming.slice(0,12);

  if(upcoming.length===0){
    list.innerHTML='<div style="font-size:12px;color:var(--muted);padding:12px 0">No upcoming events.</div>';
    return;
  }

  const colors = {earnings:'var(--red)',exit:'var(--orange)',entry:'var(--green)',review:'var(--purple)'};
  const typeLabels = {earnings:'📊 Earnings Report',exit:'🚨 Exit Deadline',entry:'✅ Entry Window',review:'🔍 Weekly Review'};

  list.innerHTML = '';
  upcoming.forEach(ev=>{
    const daysAway = Math.ceil((ev.d - TODAY)/(1000*60*60*24));
    const daysClass = daysAway<=3?'days-soon':daysAway<=7?'days-near':'days-ok';
    const daysLabel = daysAway===0?'TODAY':daysAway===1?'Tomorrow':`${daysAway}d away`;
    const dateDisplay = ev.d.toLocaleDateString('en-US',{month:'short',day:'numeric'});

    const item = document.createElement('div');
    item.className='upcoming-item';
    item.innerHTML=`
      <div class="up-date">${dateDisplay}</div>
      <div class="up-dot" style="background:${colors[ev.type]}"></div>
      <div class="up-content">
        <div class="up-sym">${ev.sym}</div>
        <div class="up-label">${typeLabels[ev.type]||ev.type}</div>
      </div>
      <div class="up-days ${daysClass}">${daysLabel}</div>`;
    list.appendChild(item);
  });
}

// ── Navigation ──
function prevMonth(){ viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} render(); }
function nextMonth(){ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} render(); }
function goToday(){ viewYear=TODAY.getFullYear(); viewMonth=TODAY.getMonth(); render(); }

// ── Toast ──
function showToast(){
  const t=document.getElementById('toast');
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}

// ── Master render ──
function render(){
  renderCalendar();
  renderStockList();
  renderUpcoming();
}

// ── Init ──
preload();
render();
</script>
</body>
</html>
