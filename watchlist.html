<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Watchlist</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap');
:root{
  --bg:#07090f;--surface:#0d1420;--card:#111827;--border:#1d3045;
  --green:#34d399;--red:#f87171;--gold:#fbbf24;--accent:#38bdf8;
  --text:#dde8f5;--sub:#6b93b8;--muted:#2d4a66;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;padding:24px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

h1{font-size:22px;font-weight:700;margin-bottom:4px;}
h1 span{color:var(--accent);}
.subtitle{font-size:12px;color:var(--muted);margin-bottom:20px;}

/* Paste box */
#paste-area{
  background:var(--surface);border:1px dashed var(--border);border-radius:10px;
  padding:16px;margin-bottom:20px;
}
#paste-area label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;display:block;margin-bottom:8px;}
#paste-input{
  width:100%;background:var(--card);border:1px solid var(--border);border-radius:7px;
  color:var(--text);padding:10px;font-size:12px;font-family:'IBM Plex Mono',monospace;
  outline:none;resize:vertical;min-height:80px;
}
#paste-input:focus{border-color:var(--accent);}
.paste-actions{display:flex;gap:8px;margin-top:8px;}
button{border:none;border-radius:7px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:opacity .15s;}
button:hover{opacity:.82;}
#btn-add{background:var(--accent);color:#07090f;}
#btn-clear-all{background:var(--card);color:var(--muted);border:1px solid var(--border);}

/* Filter row */
#filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:11px;color:var(--muted);}
.fb{background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:11px;cursor:pointer;}
.fb.active{background:var(--accent)18;color:var(--accent);border-color:var(--accent)35;}
.fb.buy.active{background:var(--green)12;color:var(--green);border-color:var(--green)30;}
.fb.wait.active{background:var(--gold)12;color:var(--gold);border-color:var(--gold)30;}
.fb.avoid.active{background:var(--red)12;color:var(--red);border-color:var(--red)30;}

/* Grid */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px;animation:fadeUp .2s ease;position:relative;}
.card.buy{border-left:3px solid var(--green);}
.card.wait{border-left:3px solid var(--gold);}
.card.avoid{border-left:3px solid var(--red);}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.card-sym{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.verdict{border-radius:5px;padding:2px 10px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
.verdict.buy{background:var(--green)12;color:var(--green);border:1px solid var(--green)28;}
.verdict.wait{background:var(--gold)12;color:var(--gold);border:1px solid var(--gold)28;}
.verdict.avoid{background:var(--red)12;color:var(--red);border:1px solid var(--red)28;}
.card-date{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);}

.divider{border:none;border-top:1px solid var(--border);margin:10px 0;}

.row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;}
.row-label{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.8px;}
.row-val{font-family:'IBM Plex Mono',monospace;font-weight:600;}
.green{color:var(--green);}
.red{color:var(--red);}
.gold{color:var(--gold);}
.blue{color:var(--accent);}
.white{color:var(--text);}

.targets{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;}
.tbox{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 10px;}
.tbox-label{font-size:9px;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;margin-bottom:3px;}
.tbox-val{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--green);}

.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);}
.card-sector{font-size:10px;color:var(--muted);}
.del-btn{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:2px 6px;border-radius:4px;}
.del-btn:hover{color:var(--red);opacity:1;}

/* Empty */
#empty{text-align:center;padding:60px 0;color:var(--muted);display:none;}
#empty .ei{font-size:36px;margin-bottom:12px;}
#empty p{font-size:13px;line-height:1.7;}
#empty code{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px;color:var(--accent);}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#07090f;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:9px 20px;border-radius:8px;z-index:999;display:none;font-weight:600;}
</style>
</head>
<body>

<h1>Stock <span>Watchlist</span></h1>
<div class="subtitle">Paste Claude's formatted block below — a card is created automatically</div>

<!-- Paste area -->
<div id="paste-area">
  <label>Paste Claude's output here</label>
  <textarea id="paste-input" placeholder="WATCHLIST&#10;Symbol: ETR&#10;Date: 2026-04-02 09:30&#10;Price: $113.50&#10;Verdict: BUY&#10;Sector: Utilities&#10;Entry: $111.00 - $113.00&#10;Stop: $108.50&#10;Target 1: $116.00&#10;Target 2: $119.00&#10;High potential: $122.00&#10;Notes: Meta deal catalyst. Low beta. Earnings April 29."></textarea>
  <div class="paste-actions">
    <button id="btn-add" onclick="parseAndAdd()">+ Add to Watchlist</button>
    <button id="btn-clear-all" onclick="clearAll()">Clear All</button>
  </div>
</div>

<!-- Filters -->
<div id="filter-row">
  <span class="filter-label">Show:</span>
  <button class="fb active" onclick="setFilter('all',this)">All</button>
  <button class="fb buy" onclick="setFilter('buy',this)">BUY</button>
  <button class="fb wait" onclick="setFilter('wait',this)">WAIT</button>
  <button class="fb avoid" onclick="setFilter('avoid',this)">AVOID</button>
</div>

<!-- Grid -->
<div id="grid"></div>
<div id="empty">
  <div class="ei">📋</div>
  <p>No entries yet.<br/>Paste Claude's formatted block above and hit <strong>Add to Watchlist</strong>.<br/><br/>
  Claude will end each analysis with a block starting with <code>WATCHLIST</code> that you can paste directly here.</p>
</div>

<div id="toast">✓ Added!</div>

<script>
let entries = JSON.parse(localStorage.getItem('watchlist') || '[]');
let filter = 'all';

function parseAndAdd(){
  const raw = document.getElementById('paste-input').value.trim();
  if(!raw){ alert('Paste Claude\'s formatted block first.'); return; }

  // Parse key: value lines
  const lines = raw.split('\n');
  const data = {};
  lines.forEach(line => {
    const idx = line.indexOf(':');
    if(idx === -1) return;
    const key = line.slice(0,idx).trim().toLowerCase().replace(/\s+/g,'_');
    const val = line.slice(idx+1).trim();
    data[key] = val;
  });

  if(!data.symbol){ alert('Could not find Symbol in the pasted block. Make sure you\'re pasting Claude\'s WATCHLIST output.'); return; }

  const entry = {
    id: Date.now().toString(),
    symbol:     data.symbol || '—',
    date:       data.date || new Date().toLocaleString(),
    price:      data.price || '—',
    verdict:    (data.verdict || 'wait').toLowerCase(),
    sector:     data.sector || '—',
    entry:      data.entry || '—',
    stop:       data.stop || '—',
    t1:         data['target_1'] || data.target_1 || '—',
    t2:         data['target_2'] || data.target_2 || '—',
    high:       data['high_potential'] || data.high_potential || '—',
    notes:      data.notes || ''
  };

  entries.unshift(entry);
  save();
  render();
  document.getElementById('paste-input').value = '';
  showToast();
}

function render(){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const filtered = filter === 'all' ? entries : entries.filter(e => e.verdict === filter);

  if(entries.length === 0){
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = '';

  filtered.forEach(e => {
    const vLabel = e.verdict === 'buy' ? '✅ BUY' : e.verdict === 'wait' ? '⏳ WAIT' : '❌ AVOID';
    const div = document.createElement('div');
    div.className = `card ${e.verdict}`;
    div.innerHTML = `
      <div class="card-top">
        <div class="card-sym">${e.symbol}</div>
        <div class="card-right">
          <span class="verdict ${e.verdict}">${vLabel}</span>
          <span class="card-date">${e.date}</span>
        </div>
      </div>

      <div class="row">
        <span class="row-label">Price at analysis</span>
        <span class="row-val white">${e.price}</span>
      </div>
      <div class="row">
        <span class="row-label">Entry zone</span>
        <span class="row-val blue">${e.entry}</span>
      </div>
      <div class="row">
        <span class="row-label">Stop loss</span>
        <span class="row-val red">${e.stop}</span>
      </div>

      <hr class="divider"/>

      <div class="targets">
        <div class="tbox">
          <div class="tbox-label">Target 1</div>
          <div class="tbox-val">${e.t1}</div>
        </div>
        <div class="tbox">
          <div class="tbox-label">Target 2</div>
          <div class="tbox-val">${e.t2}</div>
        </div>
        <div class="tbox" style="grid-column:1/-1">
          <div class="tbox-label">High Potential</div>
          <div class="tbox-val" style="color:var(--gold)">${e.high}</div>
        </div>
      </div>

      ${e.notes ? `<div style="margin-top:10px;font-size:11px;color:var(--sub);line-height:1.6;padding:8px;background:var(--surface);border-radius:6px;border:1px solid var(--border)">${e.notes}</div>` : ''}

      <div class="card-footer">
        <span class="card-sector">${e.sector}</span>
        <button class="del-btn" onclick="deleteEntry('${e.id}')">Remove</button>
      </div>`;
    grid.appendChild(div);
  });

  if(filtered.length === 0){
    grid.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:20px">No ${filter} entries.</div>`;
  }
}

function deleteEntry(id){
  entries = entries.filter(e => e.id !== id);
  save(); render();
}

function setFilter(f, el){
  filter = f;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function clearAll(){
  if(!confirm('Clear all watchlist entries?')) return;
  entries = []; save(); render();
}

function save(){ localStorage.setItem('watchlist', JSON.stringify(entries)); }

function showToast(){
  const t = document.getElementById('toast');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

window.onload = render;
</script>
</body>
</html>
